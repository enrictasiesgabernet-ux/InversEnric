# Config dels contenidors backend (web1 i web2).
# Cada backend afegeix la capçalera X-Backend amb el seu hostname,
# de manera que el proxy pugui reenviar-la al client i demostrar
# quin servidor ha respost cada petició.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # $hostname s'avalua al nom del contenidor (web1 / web2)
    add_header X-Backend $hostname always;

    location / {
        try_files $uri $uri/ =404;
    }
}
