user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout  65;

    # ------------------------------------------------------------------
    # Zona de cache per al contingut multimèdia.
    # /var/cache/nginx serà emmagatzematge dins del contenidor proxy.
    # keys_zone=media_cache:10m → 10 MB per metadades (~80k objectes)
    # max_size=100m            → fins a 100 MB de fitxers en cache
    # inactive=60m             → elimina fitxers no accedits en 60 min
    # ------------------------------------------------------------------
    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=media_cache:10m
                     max_size=100m
                     inactive=60m
                     use_temp_path=off;

    # ------------------------------------------------------------------
    # Definició del grup de backends.
    # Per defecte Nginx usa round-robin: alterna web1 i web2.
    # ------------------------------------------------------------------
    upstream backends {
        server web1:80;
        server web2:80;
    }

    # Log personalitzat que mostra quin backend ha respost i l'estat del cache
    log_format  upstream_log  '$remote_addr - [$time_local] "$request" '
                              '$status upstream=$upstream_addr '
                              'cache=$upstream_cache_status';
    access_log  /var/log/nginx/access.log  upstream_log;

    server {
        listen 80;
        server_name _;

        # --------------------------------------------------------------
        # Ruta per defecte: balanceja entre web1 i web2 sense cache.
        # Afegim capçaleres de diagnòstic:
        #   X-Backend: nom del servidor que ha respost (ve del backend).
        #   X-Upstream-Addr: IP:port del backend escollit (decidit aquí).
        # --------------------------------------------------------------
        location / {
            proxy_pass http://backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Capçalera que ve del backend (definida a backend.conf)
            add_header X-Backend $upstream_http_x_backend always;
            # Capçalera amb l'adreça de l'upstream seleccionat pel proxy
            add_header X-Upstream-Addr $upstream_addr always;
        }

        # --------------------------------------------------------------
        # Ruta específica per al contingut multimèdia cachejat.
        # Aplica proxy_cache per fitxers de /media/ i exposa l'estat.
        # --------------------------------------------------------------
        location /media/ {
            proxy_pass http://backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Activem el cache
            proxy_cache media_cache;
            proxy_cache_valid 200 206 10m;   # 10 minuts per 200 i 206 (range)
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Capçaleres informatives
            add_header X-Backend $upstream_http_x_backend always;
            add_header X-Upstream-Addr $upstream_addr always;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
