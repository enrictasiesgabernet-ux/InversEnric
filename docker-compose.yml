services:
  # Proxy invers: únic punt d'entrada exposat al port 80.
  # Connectat a les dues xarxes perquè rep tràfic extern (frontend)
  # i pot arribar als backends (backend).
  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      - web1
      - web2
    restart: unless-stopped

  # Backend 1: només xarxa interna, sense ports publicats.
  # Serveix el contingut compartit muntat en read-only.
  web1:
    image: nginx:alpine
    container_name: web1
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    restart: unless-stopped

  # Backend 2: idèntic a web1, mateix volum compartit.
  web2:
    image: nginx:alpine
    container_name: web2
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    restart: unless-stopped

networks:
  # Xarxa externa: permet que el proxy rebi tràfic del host.
  frontend:
    driver: bridge

  # Xarxa interna: aïlla els backends de l'exterior.
  # internal: true impedeix sortida a internet i accés des del host.
  backend:
    driver: bridge
    internal: true
